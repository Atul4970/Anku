<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For Ankita ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #ffd6e8, #fff5f8);
      color: #3b1f2b;
      text-align: center;
      overflow-x: hidden;
    }

    .container {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      max-width: 720px;
      width: 100%;
      background: white;
      border-radius: 28px;
      padding: 30px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.18);
      position: relative;
    }

    h1 {
      color: #d6336c;
      font-size: 34px;
    }

    p {
      font-size: 19px;
      line-height: 1.7;
    }

    button {
      background: #d6336c;
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 30px;
      font-size: 17px;
      margin: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.08);
      background: #b92458;
    }

    .heart {
      font-size: 55px;
      animation: beat 1s infinite;
    }

    @keyframes beat {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .hidden {
      display: none;
    }

    .message {
      margin-top: 25px;
      font-size: 20px;
      animation: fade 0.6s ease-in;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #noBtn {
      position: relative;
      background: #777;
    }

    .floating-heart {
      position: fixed;
      bottom: -20px;
      font-size: 24px;
      animation: floatUp 5s linear infinite;
      opacity: 0.8;
    }

    @keyframes floatUp {
      from {
        transform: translateY(0);
        opacity: 1;
      }
      to {
        transform: translateY(-110vh);
        opacity: 0;
      }
    }

    .big {
      font-size: 28px;
      color: #d6336c;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="heart">❤️</div>
    <h1>For My Beautiful Ankita</h1>

    <p>
      I made this little page just for you, because saying sorry normally felt too small.
    </p>

    <button onclick="showLove()">Open My Heart</button>
    <button onclick="showSorry()">Read My Sorry</button>
    <button onclick="showSmile()">Smile Test</button>
    <button onclick="showQuestion()">One Important Question</button>

    <div id="content" class="message"></div>

    <div id="questionBox" class="hidden">
      <p class="big">Will you forgive me and smile a little for me? 🥺</p>

      <button onclick="yesClicked()">Yes, I forgive you ❤️</button>
      <button id="noBtn" onmouseover="moveNoButton()" onclick="moveNoButton()">No 😒</button>
    </div>

    <div id="finalMsg" class="message"></div>

  </div>
</div>

<script>
  function showLove() {
    document.getElementById("questionBox").classList.add("hidden");
    document.getElementById("finalMsg").innerHTML = "";

    document.getElementById("content").innerHTML = `
      Ankita, you are not just someone I love.  
      You are the person I see in my future, in my happiness, and in my peaceful moments.  
      Your smile matters to me more than my ego, my mood, or anything else.
    `;
  }

  function showSorry() {
    document.getElementById("questionBox").classList.add("hidden");
    document.getElementById("finalMsg").innerHTML = "";

    document.getElementById("content").innerHTML = `
      I am really sorry for not taking care of you the way I should have.  
      I know care is not only about big promises.  
      It is about small moments, attention, effort, and presence.  
      I missed that, and I genuinely feel bad.
    `;
  }

  function showSmile() {
    document.getElementById("questionBox").classList.add("hidden");
    document.getElementById("finalMsg").innerHTML = "";

    document.getElementById("content").innerHTML = `
      Smile test started... 😄<br><br>
      If you smiled even 1%, I win.<br>
      If you did not smile, then I will try harder.<br>
      If you are still angry, then please remember — I love you more than this anger.
    `;
  }

  function showQuestion() {
    document.getElementById("content").innerHTML = `
      Now comes the most important part...
    `;
    document.getElementById("questionBox").classList.remove("hidden");
  }

  function yesClicked() {
    document.getElementById("finalMsg").innerHTML = `
      <span class="big">Thank you, my Ankita ❤️</span><br><br>
      I promise I will not just say sorry.  
      I will show it through my actions.  
      You are my priority, my happiness, and my favorite person.  
      I love you so much.
    `;

    createHearts();
  }

  function moveNoButton() {
    const noBtn = document.getElementById("noBtn");
    const x = Math.floor(Math.random() * 220) - 110;
    const y = Math.floor(Math.random() * 160) - 80;

    noBtn.style.transform = `translate(${x}px, ${y}px)`;

    document.getElementById("finalMsg").innerHTML = `
      No is not allowed today 😌  
      Only forgiveness, smile, and love are accepted ❤️
    `;
  }

  function createHearts() {
    for (let i = 0; i < 35; i++) {
      const heart = document.createElement("div");
      heart.className = "floating-heart";
      heart.innerHTML = "❤️";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 6000);
    }
  }
</script>

</body>
</html>
